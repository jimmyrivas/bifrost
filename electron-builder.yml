appId: com.bifrost.app
productName: Bifrost
directories:
  buildResources: resources
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!tests/*"
  - "!electron.vite.config.*"
  - "!{.eslintrc,.prettierrc,tsconfig*.json}"
  - "!{CLAUDE.md,README.md}"
  # Build caches the Docker build keeps inside the project (see
  # scripts/build-appimage-docker.sh) — must never ship in the asar.
  - "!.cache/**"
  - "!.pnpm-store/**"
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/node-pty/**
  - resources/**
linux:
  target:
    - AppImage
  maintainer: Jimmy Rivas
  category: Utility
  icon: resources/icon.png
win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
  publisherName: Jimmy Rivas
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - dmg
  category: public.app-category.utilities
  icon: resources/icon.icns
